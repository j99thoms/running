<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Running Planner | Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 1rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
    }

    .logo {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    h1 {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 1.75rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 0.35rem;
    }

    input {
      display: block;
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 7px;
      color: #f1f5f9;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1rem;
    }

    input:focus { border-color: #3b82f6; }

    button {
      width: 100%;
      padding: 0.65rem;
      background: #3b82f6;
      border: none;
      border-radius: 7px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      margin-top: 0.25rem;
    }

    button:hover { background: #2563eb; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .error {
      display: none;
      margin-top: 1rem;
      padding: 0.6rem 0.75rem;
      background: #450a0a;
      border: 1px solid #7f1d1d;
      border-radius: 7px;
      color: #fca5a5;
      font-size: 0.85rem;
      text-align: center;
    }

    .error.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏃</div>
    <h1>Running Planner</h1>

    <form id="login-form" novalidate>
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" autocapitalize="none" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required />

      <button type="submit" id="submit-btn">Sign in</button>
    </form>

    <div class="error" id="error-msg">Invalid username or password.</div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submit-btn');
      const err = document.getElementById('error-msg');

      err.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        if (res.ok) {
          window.location.href = '/';
        } else {
          err.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Sign in';
        }
      } catch (_) {
        err.textContent = 'Network error — please try again.';
        err.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
